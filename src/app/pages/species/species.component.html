<div class="species-list">
  <input [formControl]="searchControl" placeholder="Search species..." />
  @for (bird of filteredSpecies(); track bird.sciName) {
    <div
      class="species-card"
      (click)="selectSpeciesDetail(bird)"
      [class.active]="bird.speciesCode === selectedSpecies()"
    >
      {{ bird.comName }}
    </div>
  }
</div>

<div class="species-detail">
  <router-outlet />
</div>
